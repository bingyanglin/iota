name: Move IDE

on:
  workflow_call:
    inputs:
      isNightly:
        type: boolean
        default: false

concurrency:
  group: move-ide-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

jobs:
  move-auto-formatter-test:
    name: Move Auto-formatter Test
    runs-on: [self-hosted-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.iota_repo_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: ./external-crates/move/crates/move-analyzer/prettier-plugin
        run: npm install && npm i web-tree-sitter

      - name: Run npm test
        working-directory: ./external-crates/move/crates/move-analyzer/prettier-plugin
        shell: bash
        run: npm run test

  move-auto-formatter-test-cancel:
    needs: [move-auto-formatter-test]
    if: failure() && !inputs.isNightly
    runs-on: ubuntu-latest
    steps:
      - name: Cancel workflow run
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  move-ide-test:
    name: Move IDE Test
    runs-on: [self-hosted-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.iota_repo_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies (emulate a display so VS Code can be started)
        working-directory: ./external-crates/move/crates/move-analyzer/editors/code
        run: |
          sudo apt install libgtk-3-0 -y
          sudo apt-get install -y xvfb x11-apps x11-xkb-utils libx11-6 libx11-xcb1
          sudo add-apt-repository ppa:kisak/kisak-mesa -y
          sudo apt update
          sudo apt upgrade -y
          npm install && npm install --save-dev @types/node @types/semver

      - name: Build move-analyzer
        run: |
          cargo build -p iota-move-lsp --bin move-analyzer
          mkdir -p ~/.iota/bin
          cp ./target/debug/move-analyzer* ~/.iota/bin

      - name: Run npm test
        working-directory: ./external-crates/move/crates/move-analyzer/editors/code
        shell: bash
        run: npm run pretest && xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" npm run test

  move-ide-test-cancel:
    needs: [move-ide-test]
    if: failure() && !inputs.isNightly
    runs-on: ubuntu-latest
    steps:
      - name: Cancel workflow run
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  move-vscode-extension-build:
    name: Move VSCode extension build
    runs-on: [self-hosted-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.iota_repo_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: ./external-crates/move/crates/move-analyzer/editors/code
        run: npm install && npm install --save-dev @types/node @types/semver

      - name: Build VSCode extension
        working-directory: ./external-crates/move/crates/move-analyzer/editors/code
        run: npm run package

  move-vscode-extension-build-cancel:
    needs: [move-vscode-extension-build]
    if: failure() && !inputs.isNightly
    runs-on: ubuntu-latest
    steps:
      - name: Cancel workflow run
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
