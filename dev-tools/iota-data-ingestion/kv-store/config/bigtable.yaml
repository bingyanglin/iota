# IndexerExecutor config
#
# The local path where checkpoints are stored. For optimal performance,
# this should match the IOTA Node's ingestion path when running on the same host.
# Using the same path as the Node allows direct file access instead of HTTP requests,
# significantly improving sync speed.
path: "./test-checkpoints"
# Remote checkpoint store
#
# Acts as a fallback mechanism for fetching checkpoints that are not available in the local
# ingestion path. Provides redundancy and keeps ingestion running even when local
# files are not accessible.
#
# Two source types are supported (pick one):
#
#   fullnode-url: the gRPC URL of an IOTA Node that streams checkpoint data.
#
#   hybrid:
#     - historical-url (required): exposes historical checkpoint data from genesis up to the tip of the network.
#     - live-url (optional): real-time streaming of current epoch checkpoints only.
#
# Optional when:
#   1. The ingestion `path` matches the IOTA Node's path on the same host.
#   2. You don't need a fallback for data retrieval.
#   3. Local filesystem access is sufficient for your use case.
#
# Required when:
#   1. Running on a different host than the IOTA Node.
#   2. Using a different path than the Node.
#   3. Remote access is preferred over local filesystem.
remote-store:
  fullnode-url: "http://localhost:50051"
  # hybrid:
  #   historical-url: "https://checkpoints.<NETWORK>.iota.cafe/ingestion/historical"
  #   live-url: "https://checkpoints.<NETWORK>.iota.cafe/ingestion/live"

# Path to the progress store JSON file.
#
# The ingestion pipeline uses this file to persist its progress,
# ensuring state is preserved across restarts.
#
progress-store-path: "/iota/output/kv_ingestion_progress.json"

# The starting checkpoint for the ingestion pipeline (inclusive).
# If omitted, the pipeline resumes from the latest watermark stored in 'progress-store-path'.
# If provided, the pipeline starts from the specified checkpoint (e.g., 0 for genesis).
#
# start-checkpoint: 0

# The ending checkpoint for the ingestion pipeline (inclusive).
# If omitted, the pipeline continues indefinitely until the end of the data stream.
#
# end-checkpoint: 1000000

metrics-port: 8084

# Workers Configs
#
tasks:
  # Task unique name
  #
  # This task is responsible for storing historical data like:
  # - transaction
  # - transaction effects
  # - transaction events
  # - checkpoint summary
  # - checkpoint contents
  #
  # Primerely is used to provide historical data for Archival IOTA Node
  # which trough HttpKVStore fetches data trough a REST API which reads
  # the data this worker srites into
  - name: "local-kv-storage"
    # Number of workers will process the checkpoints in parallel
    concurrency: 1
    # Task type
    big-table-kv:
      instance-id: "iota"
      column-family: "iota"
      timeout-secs: 60
      # emulator-host: "localhost:8086"

      # Subset of BigTable tables this worker writes to.
      #
      # Default (field omitted or empty list): writes every supported
      # table. Production deployments should leave this unset.
      #
      # Set to a list of tables when running a backfill that should
      # populate only those tables, without re-writing data the main
      # ingestion pipeline already owns.
      #
      # tables:
      #   - objects
      #   - transactions
      #   - transactions-by-address
      #   - checkpoints
      #   - checkpoints-by-digest
