syntax = "proto3";

package iota.grpc.read;

import "common.proto";

service ReadService {
  rpc GetObject (GetObjectRequest) returns (GetObjectResponse);
  rpc GetTransaction (GetTransactionRequest) returns (iota.grpc.common.TransactionResponse);
  rpc ContainsTransaction (ContainsTransactionRequest) returns (ContainsTransactionResponse);
}

// GetObject
message GetObjectRequest {
  // The ID of the queried object
  iota.grpc.common.Address object_id = 1;
}

message GetObjectResponse {
  oneof result {
    NotExists not_exists = 1;
    Exists exists = 2;
    Deleted deleted = 3;
  }
}

message NotExists {
  iota.grpc.common.Address object_id = 1;
}

message Exists {
  // Object reference
  iota.grpc.common.ObjectRef object_ref = 1;

  // Object data (BCS-encoded)
  iota.grpc.common.BcsData data = 2;

  // Owner (oneof)
  oneof owner {
    iota.grpc.common.Address address_owner = 3;
    iota.grpc.common.Address object_owner = 4;
    SharedOwner shared = 5;
    ImmutableOwner immutable = 6;
  }

  // Object metadata
  iota.grpc.common.Digest previous_transaction = 7;
  uint64 storage_rebate = 8;

  // Optional MoveStructLayout (BCS-encoded)
  optional iota.grpc.common.BcsData move_structure_layout = 9;
}

message SharedOwner {
  uint64 initial_shared_version = 1;
}

message ImmutableOwner {}

message Deleted {
  iota.grpc.common.ObjectRef object_ref = 1;
}

// GetTransaction
message GetTransactionRequest {
  // The digest of the queried transaction
  iota.grpc.common.Digest digest = 1;
  // Options for specifying the content to be returned
  optional iota.grpc.common.TransactionResponseOptions options = 2;
}

// ContainsTransaction
message ContainsTransactionRequest {
  // The digest of the transaction to check
  iota.grpc.common.Digest digest = 1;
}

message ContainsTransactionResponse {
  // True if the transaction exists, false otherwise
  bool exists = 1;
}
