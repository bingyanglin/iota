syntax = "proto3";

package iota.grpc;

service CheckpointService {
  rpc StreamCheckpoints (StreamRequest) returns (stream Checkpoint);
}

message StreamRequest {
  optional uint64 start_index = 1;
  optional uint64 end_index = 2;
}

message Checkpoint {
  uint64 index = 1;
  bytes data = 2;
} 