syntax = "proto3";

package iota.grpc.write;

import "common.proto";

service WriteService {
  rpc ExecuteTransaction (ExecuteTransactionRequest) returns (iota.grpc.common.TransactionResponse);
  rpc DevInspectTransaction (DevInspectTransactionRequest) returns (DevInspectTransactionResponse);
  rpc DryRunTransaction (DryRunTransactionRequest) returns (DryRunTransactionResponse);
}

// ExecuteTransaction
message ExecuteTransactionRequest {
  // BCS serialized transaction data bytes
  iota.grpc.common.BcsData tx_bytes = 1;
  // List of signatures
  repeated iota.grpc.common.BcsData signatures = 2;
  // Options for specifying the content to be returned
  optional iota.grpc.common.TransactionResponseOptions options = 3;
  // The request type
  optional ExecuteTransactionRequestType request_type = 4;
}

enum ExecuteTransactionRequestType {
  WAIT_FOR_EFFECTS_CERT = 0;
  WAIT_FOR_LOCAL_EXECUTION = 1;
}

// DevInspectTransaction
message DevInspectTransactionRequest {
  // Sender address
  iota.grpc.common.Address sender = 1;
  // BCS serialized TransactionKind bytes
  iota.grpc.common.BcsData tx_bytes = 2;
  // Gas price (optional) - gas is not charged but usage is calculated
  optional uint64 gas_price = 3;
  // Additional arguments (optional)
  optional DevInspectArgs additional_args = 4;
}

message DevInspectArgs {
  // The sponsor of the gas for the transaction (optional)
  optional iota.grpc.common.Address gas_sponsor = 1;
  // The gas budget for the transaction (optional)
  optional uint64 gas_budget = 2;
  // The gas objects used to pay for the transaction (optional)
  repeated iota.grpc.common.ObjectRef gas_objects = 3;
  // Whether to skip transaction checks for the transaction (optional)
  optional bool skip_checks = 4;
  // Whether to return the transaction data
  optional bool show_txn_data = 5;
}

message DevInspectTransactionResponse {
  // Transaction effects (BCS-encoded TransactionEffects)
  iota.grpc.common.BcsData effects = 1;

  // Transaction events
  repeated iota.grpc.common.Event events = 2;

  // Execution results (including return values)
  repeated iota.grpc.common.BcsData results = 3;

  // Execution error from executing the transaction (optional)
  optional string error = 4;

  // Transaction data that was dev inspected (optional)
  optional iota.grpc.common.BcsData txn_data = 5;
}

// DryRunTransaction
message DryRunTransactionRequest {
  // BCS serialized transaction data bytes
  iota.grpc.common.BcsData tx_bytes = 1;
}

message DryRunTransactionResponse {
  // Transaction effects (BCS-encoded TransactionEffects)
  iota.grpc.common.BcsData effects = 1;

  // Transaction events
  repeated iota.grpc.common.Event events = 2;

  // Object changes
  repeated iota.grpc.common.ObjectChange object_changes = 3;

  // Balance changes
  repeated iota.grpc.common.BalanceChange balance_changes = 4;

  // Transaction input data
  iota.grpc.common.TransactionData input = 5;

  // Suggested gas price (optional)
  optional uint64 suggested_gas_price = 6;

  // Execution error source (optional, provides detailed error information)
  optional string execution_error_source = 7;
}
