      EndOfEpochTransaction:
        NEWTYPE:
          SEQ:
            TYPENAME: EndOfEpochTransactionKind
    5:
      RandomnessStateUpdate:
        NEWTYPE:
          TYPENAME: RandomnessStateUpdate
TransferObjects:
