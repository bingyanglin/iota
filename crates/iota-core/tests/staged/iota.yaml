    0:
      ECMHLiveObjectSetDigest:
        NEWTYPE:
          TYPENAME: ECMHLiveObjectSetDigest
CheckpointContents:
  ENUM:
    0:
      V1:
        NEWTYPE:
          TYPENAME: CheckpointContentsV1
CheckpointContentsV1:
