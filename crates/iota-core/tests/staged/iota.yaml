    - modules:
        SEQ: BYTES
    - dependencies:
        SEQ:
          TYPENAME: ObjectId
TransactionData:
  ENUM:
    0:
      V1:
        NEWTYPE:
          TYPENAME: TransactionDataV1
TransactionDataV1:
