    - transactions:
        SEQ:
          TYPENAME: ExecutionDigests
    - user_signatures:
        SEQ:
          SEQ:
            TYPENAME: GenericSignature
CheckpointData:
  STRUCT:
    - checkpoint_summary:
        TYPENAME: "iota_types::message_envelope::Envelope<iota_types::messages_checkpoint::CheckpointSummary, iota_types::crypto::AuthorityQuorumSignInfo<true>>"
    - checkpoint_contents:
        TYPENAME: CheckpointContents
    - transactions:
        SEQ:
          TYPENAME: CheckpointTransaction
CheckpointSummary:
  STRUCT:
    - epoch: U64
    - sequence_number: U64
    - network_total_transactions: U64
    - content_digest:
        TYPENAME: Digest
    - previous_digest:
        OPTION:
          TYPENAME: Digest
    - epoch_rolling_gas_cost_summary:
        TYPENAME: GasCostSummary
    - timestamp_ms: U64
    - checkpoint_commitments:
        SEQ:
          TYPENAME: CheckpointCommitment
    - end_of_epoch_data:
        OPTION:
          TYPENAME: EndOfEpochData
    - version_specific_data:
        SEQ: U8
CheckpointTransaction:
  STRUCT:
    - transaction:
        TYPENAME: "iota_types::message_envelope::Envelope<iota_types::transaction::SenderSignedData, iota_types::crypto::EmptySignInfo>"
    - effects:
        TYPENAME: TransactionEffects
    - events:
        OPTION:
          TYPENAME: TransactionEvents
    - input_objects:
        SEQ:
          TYPENAME: Object
    - output_objects:
        SEQ:
          TYPENAME: Object
Command:
  ENUM:
    0:
      MoveCall:
        NEWTYPE:
          TYPENAME: MoveCall
    1:
      TransferObjects:
        NEWTYPE:
          TYPENAME: TransferObjects
    2:
      SplitCoins:
        NEWTYPE:
          TYPENAME: SplitCoins
    3:
      MergeCoins:
        NEWTYPE:
          TYPENAME: MergeCoins
    4:
      Publish:
        NEWTYPE:
          TYPENAME: Publish
    5:
      MakeMoveVector:
        NEWTYPE:
          TYPENAME: MakeMoveVector
    6:
      Upgrade:
        NEWTYPE:
          TYPENAME: Upgrade
CommandArgumentError:
  ENUM:
    0:
      TypeMismatch: UNIT
    1:
      InvalidBcsBytes: UNIT
    2:
      InvalidUsageOfPureArgument: UNIT
    3:
      InvalidArgumentToPrivateEntryFunction: UNIT
    4:
      IndexOutOfBounds:
        STRUCT:
          - index: U16
    5:
      SecondaryIndexOutOfBounds:
        STRUCT:
          - result: U16
          - subresult: U16
    6:
      InvalidResultArity:
        STRUCT:
          - result: U16
    7:
      InvalidGasCoinUsage: UNIT
    8:
      InvalidValueUsage: UNIT
    9:
      InvalidObjectByValue: UNIT
    10:
      InvalidObjectByMutRef: UNIT
    11:
      SharedObjectOperationNotAllowed: UNIT
    12:
      InvalidArgumentArity: UNIT
CompressedSignature:
  ENUM:
    0:
      Ed25519:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 64
    1:
      Secp256k1:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 64
    2:
      Secp256r1:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 64
ConsensusCommitPrologueV1:
  STRUCT:
    - epoch: U64
    - round: U64
    - sub_dag_index:
        OPTION: U64
    - commit_timestamp_ms: U64
    - consensus_commit_digest:
        TYPENAME: Digest
    - consensus_determined_version_assignments:
        TYPENAME: ConsensusDeterminedVersionAssignments
ConsensusDeterminedVersionAssignments:
  ENUM:
    0:
      CancelledTransactions:
        NEWTYPE:
          SEQ:
            TYPENAME: CancelledTransaction
Data:
  ENUM:
    0:
      Move:
        NEWTYPE:
          TYPENAME: MoveStruct
    1:
      Package:
        NEWTYPE:
          TYPENAME: MovePackage
DeleteKind:
  ENUM:
    0:
      Normal: UNIT
    1:
      UnwrapThenDelete: UNIT
    2:
      Wrap: UNIT
Digest:
  NEWTYPESTRUCT: BYTES
ECMHLiveObjectSetDigest:
  STRUCT:
    - digest:
        TYPENAME: Digest
EffectsObjectChange:
  STRUCT:
    - input_state:
        TYPENAME: ObjectIn
    - output_state:
        TYPENAME: ObjectOut
    - id_operation:
        TYPENAME: IDOperation
EmptySignInfo:
  STRUCT: []
EndOfEpochData:
  STRUCT:
    - nextEpochCommittee:
        SEQ:
          TUPLE:
            - TYPENAME: AuthorityPublicKeyBytes
            - U64
    - nextEpochProtocolVersion:
        TYPENAME: ProtocolVersion
    - epochCommitments:
        SEQ:
          TYPENAME: CheckpointCommitment
    - epochSupplyChange: I64
EndOfEpochTransactionKind:
  ENUM:
    0:
      ChangeEpoch:
        NEWTYPE:
          TYPENAME: ChangeEpoch
    1:
      ChangeEpochV2:
        NEWTYPE:
          TYPENAME: ChangeEpochV2
    2:
      ChangeEpochV3:
        NEWTYPE:
          TYPENAME: ChangeEpochV3
    3:
      ChangeEpochV4:
        NEWTYPE:
          TYPENAME: ChangeEpochV4
Event:
  STRUCT:
    - package_id:
        TYPENAME: ObjectId
    - module: STR
    - sender:
        TYPENAME: Address
    - type:
        TYPENAME: StructTag
    - contents: BYTES
ExecutionData:
  STRUCT:
    - transaction:
        TYPENAME: "iota_types::message_envelope::Envelope<iota_types::transaction::SenderSignedData, iota_types::crypto::EmptySignInfo>"
    - effects:
        TYPENAME: TransactionEffects
ExecutionDigests:
  STRUCT:
    - transaction:
        TYPENAME: Digest
    - effects:
        TYPENAME: Digest
ExecutionFailureStatus:
  ENUM:
    0:
      InsufficientGas: UNIT
    1:
      InvalidGasObject: UNIT
    2:
      InvariantViolation: UNIT
    3:
      FeatureNotYetSupported: UNIT
    4:
      ObjectTooBig:
        STRUCT:
          - object_size: U64
          - max_object_size: U64
    5:
      PackageTooBig:
        STRUCT:
          - object_size: U64
          - max_object_size: U64
    6:
      CircularObjectOwnership:
        STRUCT:
          - object:
              TYPENAME: ObjectId
    7:
      InsufficientCoinBalance: UNIT
    8:
      CoinBalanceOverflow: UNIT
    9:
      PublishErrorNonZeroAddress: UNIT
    10:
      IotaMoveVerificationError: UNIT
    11:
      MovePrimitiveRuntimeError:
        STRUCT:
          - location:
              OPTION:
                TYPENAME: MoveLocation
    12:
      MoveAbort:
        STRUCT:
          - location:
              TYPENAME: MoveLocation
          - code: U64
    13:
      VmVerificationOrDeserializationError: UNIT
    14:
      VmInvariantViolation: UNIT
    15:
      FunctionNotFound: UNIT
    16:
      ArityMismatch: UNIT
    17:
      TypeArityMismatch: UNIT
    18:
      NonEntryFunctionInvoked: UNIT
    19:
      CommandArgumentError:
        STRUCT:
          - argument: U16
          - kind:
              TYPENAME: CommandArgumentError
    20:
      TypeArgumentError:
        STRUCT:
          - type_argument: U16
          - kind:
              TYPENAME: TypeArgumentError
    21:
      UnusedValueWithoutDrop:
        STRUCT:
          - result: U16
          - subresult: U16
    22:
      InvalidPublicFunctionReturnType:
        STRUCT:
          - index: U16
    23:
      InvalidTransferObject: UNIT
    24:
      EffectsTooLarge:
        STRUCT:
          - current_size: U64
          - max_size: U64
    25:
      PublishUpgradeMissingDependency: UNIT
    26:
      PublishUpgradeDependencyDowngrade: UNIT
    27:
      PackageUpgradeError:
        STRUCT:
          - kind:
              TYPENAME: PackageUpgradeError
    28:
      WrittenObjectsTooLarge:
        STRUCT:
          - object_size: U64
          - max_object_size: U64
    29:
      CertificateDenied: UNIT
    30:
      IotaMoveVerificationTimeout: UNIT
    31:
      SharedObjectOperationNotAllowed: UNIT
    32:
      InputObjectDeleted: UNIT
    33:
      ExecutionCancelledDueToSharedObjectCongestion:
        STRUCT:
          - congested_objects:
              SEQ:
                TYPENAME: ObjectId
    34:
      AddressDeniedForCoin:
        STRUCT:
          - address:
              TYPENAME: Address
          - coin_type: STR
    35:
      CoinTypeGlobalPause:
        STRUCT:
          - coin_type: STR
    36:
      ExecutionCancelledDueToRandomnessUnavailable: UNIT
    37:
      ExecutionCancelledDueToSharedObjectCongestionV2:
        STRUCT:
          - congested_objects:
              SEQ:
                TYPENAME: ObjectId
          - suggested_gas_price: U64
