    - version: U8
    - app_id: U8
IntentMessage:
  STRUCT:
    - intent:
        TYPENAME: Intent
    - value:
        TYPENAME: TransactionData
MakeMoveVector:
  STRUCT:
    - type:
        OPTION:
          TYPENAME: TypeTag
    - elements:
        SEQ:
          TYPENAME: Argument
MergeCoins:
