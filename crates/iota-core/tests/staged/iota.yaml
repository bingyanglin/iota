      InvalidLinkage: UNIT
ExecutionStatus:
  ENUM:
    0:
      Success: UNIT
    1:
      Failure:
        STRUCT:
          - error:
              TYPENAME: ExecutionFailureStatus
          - command:
              OPTION: U64
FullCheckpointContents:
  STRUCT:
    - transactions:
        SEQ:
          TYPENAME: ExecutionData
    - user_signatures:
        SEQ:
          SEQ:
            TYPENAME: GenericSignature
