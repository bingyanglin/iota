        TYPENAME: ObjectId
    - version: U64
    - modules:
        MAP:
          KEY: STR
          VALUE: BYTES
    - type_origin_table:
        SEQ:
          TYPENAME: TypeOrigin
    - linkage_table:
        MAP:
          KEY:
            TYPENAME: ObjectId
          VALUE:
            TYPENAME: UpgradeInfo
MoveStruct:
  STRUCT:
    - object_type:
        TYPENAME: MoveObjectType
    - version: U64
    - contents: BYTES
MultiSig:
