    - executed_epoch: U64
    - gas_used:
        TYPENAME: GasCostSummary
    - transaction_digest:
        TYPENAME: Digest
    - gas_object_index:
        OPTION: U32
    - events_digest:
        OPTION:
          TYPENAME: Digest
    - dependencies:
        SEQ:
          TYPENAME: Digest
    - lamport_version: U64
    - changed_objects:
        SEQ:
          TUPLE:
            - TYPENAME: ObjectId
            - TYPENAME: EffectsObjectChange
    - unchanged_shared_objects:
        SEQ:
          TUPLE:
            - TYPENAME: ObjectId
            - TYPENAME: UnchangedSharedKind
