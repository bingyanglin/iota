    0:
      RawObject:
        STRUCT:
          - data:
              TYPENAME: Data
          - owner:
              TYPENAME: Owner
GenesisTransaction:
  STRUCT:
    - objects:
        SEQ:
          TYPENAME: GenesisObject
    - events:
        SEQ:
          TYPENAME: Event
IDOperation:
  ENUM:
    0:
      None: UNIT
    1:
      Created: UNIT
    2:
      Deleted: UNIT
Intent:
