    - kind:
        TYPENAME: TransactionKind
    - sender:
        TYPENAME: Address
    - gas_data:
        TYPENAME: GasPayment
    - expiration:
        TYPENAME: TransactionExpiration
TransactionEffects:
  ENUM:
    0:
      V1:
        NEWTYPE:
          TYPENAME: TransactionEffectsV1
TransactionEffectsV1:
