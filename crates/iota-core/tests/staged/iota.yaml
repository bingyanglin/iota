TransactionKind:
  ENUM:
    0:
      ProgrammableTransaction:
        NEWTYPE:
          TYPENAME: ProgrammableTransaction
    1:
      Genesis:
        NEWTYPE:
          TYPENAME: GenesisTransaction
    2:
      ConsensusCommitPrologueV1:
        NEWTYPE:
          TYPENAME: ConsensusCommitPrologueV1
    3:
      AuthenticatorStateUpdateV1Deprecated: UNIT
