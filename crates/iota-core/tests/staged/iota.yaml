        NEWTYPE:
          TYPENAME: TupleObjectReference
    1:
      Shared:
        STRUCT:
          - object_id:
              TYPENAME: ObjectId
          - initial_shared_version: U64
          - mutable: BOOL
    2:
      Receiving:
        NEWTYPE:
          TYPENAME: TupleObjectReference
ObjectId:
  NEWTYPESTRUCT:
    TYPENAME: Address
ObjectIn:
  ENUM:
    0:
      NotExist: UNIT
    1:
      Exist:
        NEWTYPE:
          TUPLE:
            - TUPLE:
                - U64
                - TYPENAME: Digest
            - TYPENAME: Owner
ObjectInfoRequestKind:
  ENUM:
    0:
      LatestObjectInfo: UNIT
    1:
      PastObjectInfoDebug:
        NEWTYPE: U64
ObjectOut:
  ENUM:
    0:
      NotExist: UNIT
    1:
      ObjectWrite:
        NEWTYPE:
          TUPLE:
            - TYPENAME: Digest
            - TYPENAME: Owner
    2:
      PackageWrite:
        NEWTYPE:
          TUPLE:
            - U64
            - TYPENAME: Digest
Owner:
  ENUM:
    0:
      AddressOwner:
        NEWTYPE:
          TYPENAME: Address
    1:
      ObjectOwner:
        NEWTYPE:
          TYPENAME: Address
    2:
      Shared:
        STRUCT:
          - initial_shared_version: U64
    3:
      Immutable: UNIT
PackageUpgradeError:
  ENUM:
    0:
      UnableToFetchPackage:
        STRUCT:
          - package_id:
              TYPENAME: ObjectId
    1:
      NotAPackage:
        STRUCT:
          - object_id:
              TYPENAME: ObjectId
    2:
      IncompatibleUpgrade: UNIT
    3:
      DigestDoesNotMatch:
        STRUCT:
          - digest:
              TYPENAME: Digest
    4:
      UnknownUpgradePolicy:
        STRUCT:
          - policy: U8
    5:
      PackageIdDoesNotMatch:
        STRUCT:
          - package_id:
              TYPENAME: ObjectId
          - ticket_id:
              TYPENAME: ObjectId
ProgrammableTransaction:
  STRUCT:
    - inputs:
        SEQ:
          TYPENAME: CallArg
    - commands:
        SEQ:
          TYPENAME: Command
ProtocolVersion:
  NEWTYPESTRUCT: U64
PublicKey:
  ENUM:
    0:
      Ed25519:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 32
    1:
      Secp256k1:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 33
    2:
      Secp256r1:
        NEWTYPE:
          TUPLEARRAY:
            CONTENT: U8
            SIZE: 33
Publish:
