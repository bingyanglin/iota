    - data:
        TYPENAME: CheckpointSummary
    - auth_signature:
        TYPENAME: AuthorityQuorumSignInfo
"iota_types::message_envelope::Envelope<iota_types::transaction::SenderSignedData, iota_types::crypto::EmptySignInfo>":
