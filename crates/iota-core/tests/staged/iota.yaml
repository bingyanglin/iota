    - coin:
        TYPENAME: Argument
    - coins_to_merge:
        SEQ:
          TYPENAME: Argument
ModuleId:
  STRUCT:
    - address:
        TYPENAME: AccountAddress
    - name: STR
MoveCall:
  STRUCT:
    - package:
        TYPENAME: ObjectId
    - module: STR
    - function: STR
    - type_arguments:
        SEQ:
          TYPENAME: TypeTag
    - arguments:
        SEQ:
          TYPENAME: Argument
MoveLocation:
  STRUCT:
    - package:
        TYPENAME: ObjectId
    - module: STR
    - function: U16
    - instruction: U16
    - function_name:
        OPTION: STR
MoveObjectType:
  ENUM:
    0:
      Other:
        NEWTYPE:
          TYPENAME: StructTag
    1:
      GasCoin: UNIT
    2:
      StakedIota: UNIT
    3:
      Coin:
        NEWTYPE:
          TYPENAME: TypeTag
MovePackage:
