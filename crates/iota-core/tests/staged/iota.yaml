    - epoch: U64
    - protocol_version: U64
    - storage_charge: U64
    - computation_charge: U64
    - storage_rebate: U64
    - non_refundable_storage_fee: U64
    - epoch_start_timestamp_ms: U64
    - system_packages:
        SEQ:
          TYPENAME: SystemPackage
ChangeEpochV2:
  STRUCT:
    - epoch: U64
    - protocol_version: U64
    - storage_charge: U64
    - computation_charge: U64
    - computation_charge_burned: U64
    - storage_rebate: U64
    - non_refundable_storage_fee: U64
    - epoch_start_timestamp_ms: U64
    - system_packages:
        SEQ:
          TYPENAME: SystemPackage
ChangeEpochV3:
  STRUCT:
    - epoch: U64
    - protocol_version: U64
    - storage_charge: U64
    - computation_charge: U64
    - computation_charge_burned: U64
    - storage_rebate: U64
    - non_refundable_storage_fee: U64
    - epoch_start_timestamp_ms: U64
    - system_packages:
        SEQ:
          TYPENAME: SystemPackage
    - eligible_active_validators:
        SEQ: U64
ChangeEpochV4:
  STRUCT:
    - epoch: U64
    - protocol_version: U64
    - storage_charge: U64
    - computation_charge: U64
    - computation_charge_burned: U64
    - storage_rebate: U64
    - non_refundable_storage_fee: U64
    - epoch_start_timestamp_ms: U64
    - system_packages:
        SEQ:
          TYPENAME: SystemPackage
    - eligible_active_validators:
        SEQ: U64
    - scores:
        SEQ: U64
    - adjust_rewards_by_score: BOOL
CheckpointCommitment:
