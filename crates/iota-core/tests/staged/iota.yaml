---
AccountAddress:
  NEWTYPESTRUCT:
    TUPLEARRAY:
      CONTENT: U8
      SIZE: 32
Address:
  NEWTYPESTRUCT:
    TUPLEARRAY:
      CONTENT: U8
      SIZE: 32
Argument:
  ENUM:
    0:
      Gas: UNIT
    1:
      Input:
        NEWTYPE: U16
    2:
      Result:
        NEWTYPE: U16
    3:
      NestedResult:
        TUPLE:
          - U16
          - U16
AuthorityPublicKeyBytes:
  NEWTYPESTRUCT: BYTES
AuthorityQuorumSignInfo:
  STRUCT:
    - epoch: U64
    - signature:
        TUPLEARRAY:
          CONTENT: U8
          SIZE: 48
    - signers_map: BYTES
CallArg:
  ENUM:
    0:
      Pure:
        NEWTYPE: BYTES
    1:
      Object:
        NEWTYPE:
          TYPENAME: ObjectArg
CancelledTransaction:
