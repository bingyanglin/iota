syntax = "proto3";

package iota.grpc.v0.move_package_service;

import "iota/grpc/options.proto";
import "iota/grpc/v0/types.proto";

service MovePackageService {
  rpc ListPackageVersions(ListPackageVersionsRequest) returns (stream ListPackageVersionsResponse);
}

message ListPackageVersionsRequest {
  option (iota.grpc.message_accessors) = "with";

  // Required. The `storage_id` of any version of the package.
  optional iota.grpc.v0.types.ObjectId package_id = 1;

  // Optional limit on the total number of versions to return.
  // The server stops streaming after this many items.
  optional uint32 limit = 2;

  // Optional maximum message size the client can receive (1MB - 128MB).
  // If not specified, server uses default chunking threshold (4MB).
  optional uint32 max_message_size_bytes = 3;
}

message ListPackageVersionsResponse {
  option (iota.grpc.message_accessors) = "with";

  // List of all package versions, ordered by version.
  repeated PackageVersion versions = 1;

  // Indicates whether more batches will follow.
  // `false` on the final batch.
  bool has_next = 2;
}

// A simplified representation of a package version
message PackageVersion {
  option (iota.grpc.message_accessors) = "with";

  // The storage ID of this package version
  optional iota.grpc.v0.types.ObjectId package_id = 1;
  // The version number
  optional uint64 version = 2;
}
